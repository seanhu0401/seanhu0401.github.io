name: Deploy MkDocs site

on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3

      - name: Install deps
        run: uv sync

      - name: Deploy
        run: uv run mkdocs gh-deploy --force
